name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token stored. PyPI is configured to trust
# this workflow file in this repo. Runs when a GitHub Release is published, or
# manually via the Actions tab. The first successful run creates the project on
# PyPI (via the pending-publisher you configured).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  registry:
    name: Publish to MCP Registry
    needs: publish          # only after the PyPI upload succeeds
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC auth to the registry — no token to manage
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Validate server.json
        run: ./mcp-publisher validate
      - name: Wait for PyPI to propagate
        run: sleep 30
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to the MCP Registry
        run: ./mcp-publisher publish
